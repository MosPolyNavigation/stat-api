repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: system
        types: [ python ]
        stages:
          - pre-push
          - pre-commit

      - id: ruff-format
        name: ruff format
        entry: ruff format --check
        language: system
        types: [ python ]
        stages:
          - pre-push
          - pre-commit

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [ pre-push ]