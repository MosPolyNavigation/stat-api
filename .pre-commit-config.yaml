repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [ python ]
        stages: [ pre-push ]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        language: system
        types: [ python ]
        stages: [ pre-push ]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [ pre-push ]