name: Docker prod manual
on:
  workflow_dispatch:
  
permissions:
    packages: write
    contents: read

env:
  IMAGE_NAME: "statapi"

jobs:
  prepare-panel:
    name: Prepare dist for image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Prepare front
        working-directory: ./admin-panel
        run: |
          bun install --frozen
          bun run build

      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-panel
          path: ./admin-panel/dist
          retention-days: 1

  push:
    needs: prepare-panel
    name: Build and push a Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Download admin panel dist
        uses: actions/download-artifact@v4
        with:
          name: dist-panel
          path: ./dist-panel
      
      - name: Build image
        run: docker build . --file Dockerfile --tag $IMAGE_NAME --label "runnumber=${GITHUB_RUN_ID}"

      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin

      - name: Push image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          echo IMAGE_ID=$IMAGE_ID
          
          docker tag $IMAGE_NAME $IMAGE_ID:latest
          docker push $IMAGE_ID:latest
  
  release:
    name: Push changes to hosting
    needs: push
    runs-on: ubuntu-latest
    steps:
      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Push to hosting
        run: |
          CURRENT_DATE=$(date +'%Y-%m-%d-%H-%M')
          git clone ${{ secrets.AMVERA_REMOTE }} .

          echo $CURRENT_DATE > update_time.txt
          git add update_time.txt

          git commit -m "Updated at $CURRENT_DATE"

          # Теперь пушим в amvera
          git push origin master
